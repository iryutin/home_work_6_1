{% extends 'base.html' %}
{% load my_tags %}
{% block title %} Главная {% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h2 class="mb-0">Регистрация</h2>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                        {% csrf_token %}

                        <!-- Аватар -->
                        <div class="mb-4 text-center">
                            <div class="avatar-upload mb-3">
                                <div class="avatar-preview rounded-circle mx-auto" style="width: 120px; height: 120px; background-color: #f8f9fa;">
                                    <img id="avatarPreview" src="#" alt="Ваш аватар" class="img-fluid rounded-circle d-none" style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <label for="id_avatar" class="btn btn-outline-primary mt-3">
                                    <i class="bi bi-camera-fill me-2"></i>Загрузить аватар
                                </label>
                                <input type="file" name="avatar" id="id_avatar" accept="image/*" class="d-none">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" id="id_email" class="form-control form-control-lg" required>
                            <div class="invalid-feedback">
                                Пожалуйста, введите корректный email
                            </div>
                        </div>

                        <!-- Имя пользователя -->
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Имя пользователя <span class="text-danger">*</span></label>
                            <input type="text" name="username" id="id_username" class="form-control form-control-lg" required>
                            <div class="invalid-feedback">
                                Пожалуйста, введите имя пользователя
                            </div>
                        </div>

                        <!-- Пароль -->
                        <div class="mb-3">
                            <label for="id_password1" class="form-label">Пароль <span class="text-danger">*</span></label>
                            <input type="password" name="password1" id="id_password1" class="form-control form-control-lg" required>
                            <div class="form-text">Минимум 8 символов</div>
                        </div>

                        <!-- Подтверждение пароля -->
                        <div class="mb-3">
                            <label for="id_password2" class="form-label">Подтверждение пароля <span class="text-danger">*</span></label>
                            <input type="password" name="password2" id="id_password2" class="form-control form-control-lg" required>
                        </div>

                        <!-- Телефон -->
                        <div class="mb-3">
                            <label for="id_phone" class="form-label">Телефон</label>
                            <input type="tel" name="phone_namber" id="id_phone" class="form-control form-control-lg">
                            <div class="form-text">Формат: +7 (XXX) XXX-XX-XX</div>
                        </div>

                        <!-- Страна -->
                        <div class="mb-4">
                            <label for="id_country" class="form-label">Страна</label>
                            <select name="country" id="id_country" class="form-select form-select-lg">
                                <option value="" selected>Выберите страну</option>
                                <option value="RU">Россия</option>
                                <option value="KZ">Казахстан</option>
                                <option value="BY">Беларусь</option>
                                <option value="UA">Украина</option>
                                <option value="US">США</option>
                                <option value="DE">Германия</option>
                            </select>
                        </div>

                        <!-- Кнопка регистрации -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-plus-fill me-2"></i>Зарегистрироваться
                            </button>
                        </div>

                        <!-- Ссылка на вход -->
                        <div class="text-center">
                            <p class="mb-0">Уже есть аккаунт? <a href="{% url 'user:login'%}" class="text-decoration-none">Войти</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript для предпросмотра аватара и валидации -->
<script>
    // Предпросмотр аватара
    document.getElementById('id_avatar').addEventListener('change', function(e) {
        const preview = document.getElementById('avatarPreview');
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.classList.remove('d-none');
        }

        if (file) {
            reader.readAsDataURL(file);
        }
    });

    // Валидация формы
    (function() {
        'use strict';

        const forms = document.querySelectorAll('.needs-validation');

        Array.prototype.slice.call(forms).forEach(function(form) {
            form.addEventListener('submit', function(event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }

                form.classList.add('was-validated');
            }, false);
        });
    })();

    // Маска для телефона
    document.getElementById('id_phone').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + ' (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });
</script>
{% endblock %}
